<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact | Top Car Shippers</title>
  <meta name="description" content="Get in touch with Top Car Shippers." />
  <link rel="canonical" href="https://topcarshippers.com/contact" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .contact-wrap { max-width: 640px; margin: 0 auto; padding: 72px 32px 96px; }
    .contact-form { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }
    .form-group input, .form-group textarea, .form-group select {
      font-family: var(--sans); font-size: 15px; color: var(--ink);
      background: var(--paper); border: 1px solid var(--rule-strong);
      padding: 12px 14px; border-radius: 0; outline: none;
      transition: border-color 0.15s;
      width: 100%; box-sizing: border-box;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--ink); }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .form-submit {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--accent); color: #fff;
      font-family: var(--mono); font-size: 13px; letter-spacing: 0.16em;
      text-transform: uppercase; font-weight: 600;
      padding: 14px 24px; border: 1px solid var(--accent);
      cursor: pointer; border-radius: 4px; align-self: flex-start;
      transition: background 0.15s;
    }
    .form-submit:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
      .contact-wrap { padding: 48px 20px 72px; }
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="page-hero">
  <div class="wrap">
    <div class="page-eyebrow">Contact</div>
    <h1>Get in Touch</h1>
    <p class="page-hero-sub">Use the form below to send us a message.</p>
  </div>
</div>

<main>
<div class="contact-wrap">

  <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="contact-form">
    <input type="hidden" name="form-name" value="contact" />
    <p style="display:none;"><label>Do not fill this out: <input name="bot-field" /></label></p>

    <div class="form-row">
      <div class="form-group">
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="first-name" required autocomplete="given-name" />
      </div>
      <div class="form-group">
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="last-name" required autocomplete="family-name" />
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" />
    </div>

    <div class="form-group">
      <label for="message">Note</label>
      <textarea id="message" name="message" required></textarea>
    </div>

    <button type="submit" class="form-submit">Send Message</button>
  </form>

</div>
</main>

<div id="footer-placeholder"></div>
<script src="/js/components.js"></script>
</body>
</html>
